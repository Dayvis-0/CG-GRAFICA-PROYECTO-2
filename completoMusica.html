<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Audio 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #050510;
            --fg: #e0e0f0;
            --muted: #6a6a8a;
            --accent: #00ffaa;
            --accent2: #ff3366;
            --card: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--fg);
            overflow: hidden;
            height: 100vh;
        }
        .font-display { font-family: 'Orbitron', monospace; }

        #canvas-container { position: fixed; inset: 0; z-index: 0; }

        /* Overlay inicial */
        #overlay {
            transition: opacity 0.7s ease, visibility 0.7s ease;
        }
        #overlay.hidden-overlay {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Zona de subida */
        .upload-zone {
            border: 2px dashed var(--accent);
            border-radius: 1.5rem;
            padding: 2.5rem 3.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 255, 170, 0.03);
        }
        .upload-zone:hover {
            background: rgba(0, 255, 170, 0.08);
            border-color: #44ffcc;
            transform: scale(1.03);
            box-shadow: 0 0 50px rgba(0, 255, 170, 0.15);
        }

        /* Barra de controles */
        #controls-bar {
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #controls-bar.hidden-bar {
            opacity: 0;
            transform: translateY(24px);
            pointer-events: none;
        }

        /* Botones circulares */
        .ctrl-btn {
            width: 42px; height: 42px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--accent);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            flex-shrink: 0;
        }
        .ctrl-btn:hover {
            background: rgba(0, 255, 170, 0.15);
            border-color: var(--accent);
            box-shadow: 0 0 18px rgba(0, 255, 170, 0.2);
        }

        /* Barra de progreso */
        .progress-bar {
            height: 5px;
            background: rgba(255,255,255,0.07);
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 3px;
            width: 0%;
            transition: width 0.15s linear;
        }

        /* Animaciones */
        @keyframes float-y {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float-anim { animation: float-y 3s ease-in-out infinite; }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 20px rgba(0,255,170,0.08); }
            50% { box-shadow: 0 0 45px rgba(0,255,170,0.22); }
        }
        .pulse-glow { animation: pulse-border 2.5s ease-in-out infinite; }

        /* Indicador de arrastre */
        .drag-active .upload-zone {
            background: rgba(0,255,170,0.15) !important;
            border-color: #66ffdd !important;
            transform: scale(1.06) !important;
        }
    </style>
</head>
<body>

    <!-- Canvas 3D -->
    <div id="canvas-container"></div>

    <!-- Overlay: selección de archivo -->
    <div id="overlay" class="fixed inset-0 z-20 flex items-center justify-center bg-black/55 backdrop-blur-sm">
        <div class="text-center max-w-md px-6">
            <div class="float-anim mb-5">
                <i class="fas fa-headphones text-5xl" style="color:var(--accent)"></i>
            </div>
            <h1 class="font-display text-2xl sm:text-4xl font-black mb-2 tracking-widest" style="color:var(--fg)">
                VISUALIZADOR 3D
            </h1>
            <p class="text-sm sm:text-base mb-8" style="color:var(--muted)">
                Sube una canción y observa las frecuencias cobrar vida en tres dimensiones
            </p>
            <label class="upload-zone pulse-glow inline-block">
                <input type="file" accept="audio/*" id="fileInput" class="hidden">
                <div class="flex flex-col items-center gap-3">
                    <i class="fas fa-cloud-arrow-up text-3xl" style="color:var(--accent)"></i>
                    <span class="font-display text-xs sm:text-sm tracking-widest" style="color:var(--accent)">
                        SELECCIONAR ARCHIVO
                    </span>
                    <span class="text-xs" style="color:var(--muted)">MP3, WAV, OGG, FLAC</span>
                </div>
            </label>
            <p class="text-xs mt-4" style="color:var(--muted)">o arrastra y suelta aqui</p>
        </div>
    </div>

    <!-- Barra de controles inferior -->
    <div id="controls-bar" class="fixed bottom-5 left-1/2 -translate-x-1/2 z-10 w-[95%] max-w-xl px-3 hidden-bar">
        <div class="rounded-2xl p-4 flex flex-col gap-3" style="background:rgba(5,5,16,0.88);border:1px solid var(--border);backdrop-filter:blur(24px)">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="flex items-center gap-3">
                <button class="ctrl-btn" id="playPauseBtn" title="Reproducir / Pausar">
                    <i class="fas fa-pause" id="playPauseIcon"></i>
                </button>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium truncate" id="songName">—</p>
                    <p class="text-xs" style="color:var(--muted)">
                        <span id="currentTime">0:00</span> / <span id="totalTime">0:00</span>
                    </p>
                </div>
                <button class="ctrl-btn" id="fullscreenBtn" title="Pantalla completa">
                    <i class="fas fa-expand"></i>
                </button>
                <label class="ctrl-btn" title="Cargar otra canción">
                    <i class="fas fa-folder-open"></i>
                    <input type="file" accept="audio/*" id="fileInputAlt" class="hidden">
                </label>
            </div>
        </div>
    </div>

    <!-- Three.js con importmap -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // =============================================
        //  CONFIGURACIÓN DEL VISUALIZADOR
        // =============================================
        const COLS       = 32;     // Barras en eje X (frecuencia)
        const ROWS       = 16;     // Barras en eje Z (profundidad)
        const BAR_SIZE   = 0.34;   // Ancho y profundidad de cada barra
        const SPACING    = 0.5;    // Distancia entre centros de barras
        const MAX_HEIGHT = 10;     // Altura máxima que puede alcanzar una barra
        const LERP_SPEED = 0.14;   // Suavizado de movimiento (0–1)
        const FFT_SIZE   = 512;    // Tamaño FFT → 256 bins de frecuencia

        // =============================================
        //  VARIABLES GLOBALES
        // =============================================
        let scene, camera, renderer, controls;
        let bars = [];
        let barGroup;
        let accentLight1, accentLight2;
        let audioContext, analyser, dataArray, bufferLength;
        let audioElement = new Audio();
        let mediaSource  = null;
        let audioInitialized = false;
        let isPlaying = false;
        let hasAudio  = false;
        const clock = new THREE.Clock();

        // =============================================
        //  TABLA DE COLORES PRE-CALCULADA (LUT)
        //  teal oscuro → cian-verde → rosa caliente
        // =============================================
        const colorLUT    = [];
        const emissiveLUT = [];
        (function buildColorLUT() {
            const c1  = new THREE.Color(0x003844);
            const c2  = new THREE.Color(0x00ffaa);
            const c3  = new THREE.Color(0xff3366);
            const tmp = new THREE.Color();
            for (let i = 0; i <= 255; i++) {
                const t = i / 255;
                if (t < 0.5) {
                    tmp.lerpColors(c1, c2, t * 2);
                } else {
                    tmp.lerpColors(c2, c3, (t - 0.5) * 2);
                }
                colorLUT.push(tmp.clone());
                emissiveLUT.push(tmp.clone().multiplyScalar(0.35));
            }
        })();

        // =============================================
        //  INICIALIZAR ESCENA THREE.JS
        // =============================================
        function initScene() {
            // --- Escena ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.018);

            // --- Cámara ---
            camera = new THREE.PerspectiveCamera(
                55, window.innerWidth / window.innerHeight, 0.1, 200
            );
            camera.position.set(0, 14, 18);

            // --- Renderer ---
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // --- Controles orbitales (rotar, zoom, arrastrar) ---
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping  = true;
            controls.dampingFactor  = 0.06;
            controls.maxPolarAngle  = Math.PI / 2.15;
            controls.minPolarAngle  = 0.25;
            controls.minDistance     = 8;
            controls.maxDistance     = 40;
            controls.target.set(0, 1, 0);

            // --- Luces ---
            scene.add(new THREE.AmbientLight(0x0a0a22, 0.6));

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(5, 20, 10);
            scene.add(dirLight);

            accentLight1 = new THREE.PointLight(0x00ffaa, 3, 45);
            accentLight1.position.set(12, 12, 8);
            scene.add(accentLight1);

            accentLight2 = new THREE.PointLight(0xff3366, 2, 45);
            accentLight2.position.set(-12, 10, -8);
            scene.add(accentLight2);

            // --- Grilla decorativa en el suelo ---
            const grid = new THREE.GridHelper(28, 56, 0x005544, 0x001a11);
            grid.position.y = -0.02;
            scene.add(grid);

            // --- Crear barras del visualizador ---
            createBars();

            // --- Responsive ---
            window.addEventListener('resize', onResize);
        }

        // =============================================
        //  CREAR GRILLA DE BARRAS 3D
        // =============================================
        function createBars() {
            barGroup = new THREE.Group();

            // Geometría compartida: cubo de altura 1, origen en la base
            const geo = new THREE.BoxGeometry(BAR_SIZE, 1, BAR_SIZE);
            geo.translate(0, 0.5, 0); // Pivot en la base

            const offX = (COLS - 1) * SPACING / 2;
            const offZ = (ROWS - 1) * SPACING / 2;

            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const mat = new THREE.MeshStandardMaterial({
                        color:    colorLUT[0],
                        emissive: emissiveLUT[0],
                        metalness: 0.4,
                        roughness: 0.5,
                    });

                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(
                        col * SPACING - offX,
                        0,
                        row * SPACING - offZ
                    );
                    mesh.scale.y = 0.05; // Altura inicial mínima

                    // Datos de animación almacenados en la malla
                    mesh.userData = {
                        col, row,
                        targetHeight:  0.05,
                        currentHeight: 0.05,
                    };

                    barGroup.add(mesh);
                    bars.push(mesh);
                }
            }
            scene.add(barGroup);
        }

        // =============================================
        //  INICIALIZAR AUDIO (Web Audio API)
        // =============================================
        function initAudio(file) {
            // Crear contexto y analizador solo la primera vez
            if (!audioInitialized) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = FFT_SIZE;
                analyser.smoothingTimeConstant = 0.78;
                bufferLength = analyser.frequencyBinCount; // 256
                dataArray = new Uint8Array(bufferLength);

                // Conectar: audio → analizador → altavoces
                mediaSource = audioContext.createMediaElementSource(audioElement);
                mediaSource.connect(analyser);
                analyser.connect(audioContext.destination);
                audioInitialized = true;
            }

            // Cargar archivo en el elemento <audio>
            audioElement.src = URL.createObjectURL(file);
            audioElement.load();

            // Reanudar contexto si el navegador lo suspendió
            if (audioContext.state === 'suspended') audioContext.resume();

            // Reproducir
            audioElement.play().then(() => {
                isPlaying = true;
                hasAudio  = true;
                updatePlayPauseIcon();
            }).catch(err => console.error('Error al reproducir:', err));

            // Actualizar UI
            document.getElementById('songName').textContent = file.name;
            document.getElementById('overlay').classList.add('hidden-overlay');
            document.getElementById('controls-bar').classList.remove('hidden-bar');
        }

        // =============================================
        //  BUCLE PRINCIPAL DE ANIMACIÓN
        // =============================================
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // --- Leer datos de frecuencia del audio ---
            let freqData = null;
            if (hasAudio && analyser) {
                analyser.getByteFrequencyData(dataArray);
                freqData = dataArray;
            }

            // --- Energía promedio (0–1) para efectos globales ---
            let avgEnergy = 0;
            if (freqData) {
                for (let i = 0; i < bufferLength; i++) avgEnergy += freqData[i];
                avgEnergy /= (bufferLength * 255);
            }

            // --- Actualizar cada barra ---
            for (let i = 0; i < bars.length; i++) {
                const bar = bars[i];
                const { col, row } = bar.userData;
                let targetHeight;

                if (freqData && isPlaying) {
                    // Mapear columna a bin de frecuencia (primer 70% del espectro)
                    const freqIdx = Math.min(
                        Math.floor((col / COLS) * bufferLength * 0.7),
                        bufferLength - 1
                    );
                    const freqVal = freqData[freqIdx] / 255;

                    // Filas delanteras responden más, traseras menos
                    const rowFactor = 1.0 - (row / ROWS) * 0.6;

                    // Pequeña onda adicional por fila
                    const wave = 0.85 + 0.15 * Math.sin(time * 3 + row * 0.5);

                    targetHeight = freqVal * MAX_HEIGHT * rowFactor * wave;
                } else {
                    // Animación idle cuando no hay audio
                    const w = Math.sin(time * 1.5 + col * 0.25 + row * 0.3);
                    targetHeight = (w * 0.5 + 0.5) * 1.8 + 0.1;
                }

                // Suavizar altura con interpolación lineal
                bar.userData.targetHeight  = targetHeight;
                bar.userData.currentHeight += (targetHeight - bar.userData.currentHeight) * LERP_SPEED;
                const h = Math.max(0.05, bar.userData.currentHeight);
                bar.scale.y = h;

                // Color según altura normalizada
                const t = Math.min(1, h / MAX_HEIGHT);
                const idx = Math.min(255, Math.floor(t * 255));
                bar.material.color.copy(colorLUT[idx]);
                bar.material.emissive.copy(emissiveLUT[idx]);
            }

            // --- Efectos globales reactivos ---
            // Rotación sutil del grupo
            barGroup.rotation.y = Math.sin(time * 0.15) * 0.08;

            // Intensidad de luces pulsando con la música
            accentLight1.intensity = 3 + avgEnergy * 6;
            accentLight2.intensity = 2 + avgEnergy * 5;

            // Niebla que respira con el bajo
            scene.fog.density = 0.018 + avgEnergy * 0.025;

            // Fondo que se ilumina sutilmente
            scene.background.setRGB(
                0.02 + avgEnergy * 0.04,
                0.015 + avgEnergy * 0.01,
                0.06 + avgEnergy * 0.03
            );

            // --- Controles y renderizado ---
            controls.update();
            renderer.render(scene, camera);

            // --- Actualizar barra de progreso y tiempo ---
            if (hasAudio && audioElement.duration && !isNaN(audioElement.duration)) {
                const pct = (audioElement.currentTime / audioElement.duration) * 100;
                document.getElementById('progressFill').style.width = pct + '%';
                document.getElementById('currentTime').textContent = fmtTime(audioElement.currentTime);
                document.getElementById('totalTime').textContent   = fmtTime(audioElement.duration);
            }
        }

        // =============================================
        //  UTILIDADES
        // =============================================
        function fmtTime(s) {
            if (isNaN(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        function updatePlayPauseIcon() {
            document.getElementById('playPauseIcon').className =
                isPlaying ? 'fas fa-pause' : 'fas fa-play';
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // =============================================
        //  EVENTOS DE INTERFAZ
        // =============================================

        // --- Subida de archivo (botón principal) ---
        document.getElementById('fileInput').addEventListener('change', e => {
            if (e.target.files.length) initAudio(e.target.files[0]);
        });

        // --- Subida de archivo (botón alternativo en controles) ---
        document.getElementById('fileInputAlt').addEventListener('change', e => {
            if (e.target.files.length) initAudio(e.target.files[0]);
        });

        // --- Play / Pausa ---
        document.getElementById('playPauseBtn').addEventListener('click', () => {
            if (!hasAudio) return;
            if (isPlaying) {
                audioElement.pause();
                isPlaying = false;
            } else {
                if (audioContext?.state === 'suspended') audioContext.resume();
                audioElement.play();
                isPlaying = true;
            }
            updatePlayPauseIcon();
        });

        // --- Clic en barra de progreso para saltar ---
        document.getElementById('progressBar').addEventListener('click', e => {
            if (!hasAudio || !audioElement.duration) return;
            const rect  = e.currentTarget.getBoundingClientRect();
            const ratio = (e.clientX - rect.left) / rect.width;
            audioElement.currentTime = ratio * audioElement.duration;
        });

        // --- Pantalla completa ---
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        });

        // --- Fin de canción ---
        audioElement.addEventListener('ended', () => {
            isPlaying = false;
            updatePlayPauseIcon();
        });

        // --- Drag & Drop sobre el overlay ---
        const overlay = document.getElementById('overlay');
        overlay.addEventListener('dragover', e => {
            e.preventDefault();
            overlay.classList.add('drag-active');
        });
        overlay.addEventListener('dragleave', () => {
            overlay.classList.remove('drag-active');
        });
        overlay.addEventListener('drop', e => {
            e.preventDefault();
            overlay.classList.remove('drag-active');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('audio/')) initAudio(file);
        });

        // =============================================
        //  ARRANCAR TODO
        // =============================================
        initScene();
        animate();
    </script>
</body>
</html>
