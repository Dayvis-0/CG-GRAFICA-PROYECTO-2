<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuarto 3D</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
  #info {
    position: absolute; top: 10px; left: 10px; color: #fff;
    font-family: sans-serif; font-size: 13px; background: rgba(0,0,0,0.5);
    padding: 6px 10px; border-radius: 6px; z-index: 10;
  }
</style>
</head>
<body>
<div id="info">Mueve el mouse / arrastra para mirar alrededor. Flechas o WASD para moverte dentro del cuarto.</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const ROOM_SIZE = 10;   // ancho/profundidad del cuarto
  const ROOM_HEIGHT = 5;  // altura del cuarto
  const MARGIN = 0.5;     // margen para no chocar con las paredes

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x141416);

  const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 1.6, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Luces equilibradas para dar realismo, volumen y hermosos gradientes de sombra
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);

  const point = new THREE.PointLight(0xffffff, 1.2, 20);
  point.position.set(0, ROOM_HEIGHT - 0.5, 0);
  scene.add(point);

  // Materiales base con colores reales y contrastantes, sin quemar por sobreexposición
  const floorMat = new THREE.MeshStandardMaterial({ 
    color: 0x7a8084,       // Gris cemento medio (un poco más claro y equilibrado)
    roughness: 0.7,
    metalness: 0.1 
  });
  
  const wallMat = new THREE.MeshStandardMaterial({ 
    color: 0x4a5a64,       // Elegante azul grisáceo nórdico (muestra gradientes de luz increíbles)
    roughness: 0.9,
    metalness: 0.0,
    side: THREE.DoubleSide 
  });
  
  const ceilMat = new THREE.MeshStandardMaterial({ 
    color: 0xf5f5f5,       // Blanco tiza limpio que contrasta fuertemente con el piso
    roughness: 0.9,
    metalness: 0.0,
    side: THREE.DoubleSide 
  });

  // Piso
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_SIZE, ROOM_SIZE), floorMat);
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);

  // Techo
  const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_SIZE, ROOM_SIZE), ceilMat);
  ceiling.rotation.x = Math.PI / 2;
  ceiling.position.y = ROOM_HEIGHT;
  scene.add(ceiling);

  // Paredes (4)
  const wallGeo = new THREE.PlaneGeometry(ROOM_SIZE, ROOM_HEIGHT);
  const half = ROOM_SIZE / 2;

  const wallNorth = new THREE.Mesh(wallGeo, wallMat);
  wallNorth.position.set(0, ROOM_HEIGHT / 2, -half);
  scene.add(wallNorth);

  const wallSouth = new THREE.Mesh(wallGeo, wallMat);
  wallSouth.position.set(0, ROOM_HEIGHT / 2, half);
  wallSouth.rotation.y = Math.PI;
  scene.add(wallSouth);

  const wallEast = new THREE.Mesh(wallGeo, wallMat);
  wallEast.position.set(half, ROOM_HEIGHT / 2, 0);
  wallEast.rotation.y = -Math.PI / 2;
  scene.add(wallEast);

  const wallWest = new THREE.Mesh(wallGeo, wallMat);
  wallWest.position.set(-half, ROOM_HEIGHT / 2, 0);
  wallWest.rotation.y = Math.PI / 2;
  scene.add(wallWest);

  // Controles: mirar con mouse, mover con teclado, confinado dentro del cuarto
  let yaw = 0, pitch = 0;
  let isDragging = false, lastX = 0, lastY = 0;

  renderer.domElement.addEventListener('mousedown', (e) => {
    isDragging = true; lastX = e.clientX; lastY = e.clientY;
  });
  window.addEventListener('mouseup', () => isDragging = false);
  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    yaw -= dx * 0.003;
    pitch -= dy * 0.003;
    pitch = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, pitch));
  });

  const keys = {};
  window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

  function updateMovement() {
    const speed = 0.08;
    const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
    const right = new THREE.Vector3(Math.sin(yaw + Math.PI/2), 0, Math.cos(yaw + Math.PI/2));

    let move = new THREE.Vector3();
    if (keys['w'] || keys['arrowup']) move.sub(forward);
    if (keys['s'] || keys['arrowdown']) move.add(forward);
    if (keys['a'] || keys['arrowleft']) move.sub(right);
    if (keys['d'] || keys['arrowright']) move.add(right);

    if (move.lengthSq() > 0) {
      move.normalize().multiplyScalar(speed);
      camera.position.x += move.x;
      camera.position.z += move.z;
    }

    // Confinar dentro del cuarto (no atravesar paredes)
    const limit = ROOM_SIZE / 2 - MARGIN;
    camera.position.x = Math.max(-limit, Math.min(limit, camera.position.x));
    camera.position.z = Math.max(-limit, Math.min(limit, camera.position.z));
    camera.position.y = 1.6; // altura fija de "ojos"

    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
  }

  function animate() {
    requestAnimationFrame(animate);
    updateMovement();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
